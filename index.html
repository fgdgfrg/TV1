<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }
        #player-container {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
        }
        iframe, video {
            width: 100%; height: 100%;
            border: none; object-fit: cover;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
    <div id="player-container"></div>
    <script>
        const params    = new URLSearchParams(window.location.search);
        const type      = params.get('type');
        const videoId   = params.get('v');
        const startTime = parseInt(params.get('t')) || 0;
        const container = document.getElementById('player-container');

        // ─── YouTube ───────────────────────────────────────────────
        // يستقبل الـ volume من اللعبة عبر SendDuiMessage
        let ytPlayer = null;
        window.addEventListener('message', function(e) {
            try {
                const msg = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                if (msg.type === 'setVolume' && ytPlayer) {
                    const vol = Math.round(msg.volume * 100);
                    if (msg.volume <= 0) {
                        ytPlayer.mute();
                        ytPlayer.setVolume(0);
                    } else {
                        ytPlayer.unMute();
                        ytPlayer.setVolume(vol);
                    }
                }
            } catch(_) {}
        });

        function initYouTube() {
            ytPlayer = new YT.Player('player-container', {
                videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    mute: 0,        // مو muted — الصوت يجي من هنا
                    start: startTime,
                    rel: 0,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    disablekb: 1,
                    playsinline: 1,
                },
                events: {
                    onReady(e) {
                        e.target.setVolume(0); // يبدأ صامت، اللعبة ترفعه
                        e.target.playVideo();
                    },
                    onStateChange(e) {
                        if (e.data === YT.PlayerState.ENDED) {
                            try { e.target.seekTo(0, true); e.target.playVideo(); } catch (_) {}
                        }
                    },
                    onError() {
                        setTimeout(() => { try { ytPlayer.playVideo(); } catch (_) {} }, 2000);
                    }
                }
            });
        }

        if (type === 'youtube' && videoId) {
            if (typeof YT !== 'undefined' && YT.Player) initYouTube();
            else window.onYouTubeIframeAPIReady = initYouTube;

        // ─── Twitch ────────────────────────────────────────────────
        } else if (type === 'twitch' && videoId) {
            const tp = new Twitch.Player("player-container", {
                channel: videoId,
                width: "100%", height: "100%",
                autoplay: true, muted: true
            });
            tp.addEventListener(Twitch.Player.READY,   () => tp.setMuted(true));
            tp.addEventListener(Twitch.Player.PLAYING,  () => tp.setMuted(true));

        // ─── Kick (iframe مباشر، بدون GitHub) ─────────────────────
        } else if (type === 'kick' && videoId) {
            container.innerHTML = `
                <iframe
                    src="https://player.kick.com/${videoId}?autoplay=true&muted=true"
                    allow="autoplay; fullscreen"
                    allowfullscreen>
                </iframe>`;

        // ─── Direct MP4/WebM ───────────────────────────────────────
        } else if (type === 'direct' && videoId) {
            container.innerHTML = `
                <video src="${decodeURIComponent(videoId)}"
                    autoplay loop muted playsinline
                    style="width:100%;height:100%;object-fit:cover">
                </video>`;
            const vid = container.querySelector('video');
            vid.addEventListener('loadedmetadata', () => {
                if (vid.duration && startTime > 0)
                    vid.currentTime = startTime % vid.duration;
            });
        }
    </script>
</body>
</html>
