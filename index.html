<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        iframe, video { width: 100%; height: 100%; border: none; object-fit: cover; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
    <div id="player-container"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const videoId = params.get('v');
        const startTime = parseInt(params.get('t')) || 0;
        const container = document.getElementById('player-container');

        let ytPlayer, twitchPlayer, directPlayer;

        function initYouTube() {
            ytPlayer = new YT.Player('player-container', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'mute': 1,
                    'start': startTime,
                    'rel': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3,
                    'origin': 'https://fgdgfrg.github.io'
                },
                events: {
                    'onReady': function(event) {
                        event.target.playVideo();
                    },
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            setTimeout(() => {
                                try {
                                    var current = ytPlayer.getCurrentTime();
                                    if (current < startTime - 3) {
                                        ytPlayer.seekTo(startTime, true);
                                    }
                                } catch(e) {}
                            }, 500);
                        }
                    }
                }
            });
        }

        if (type === 'youtube' && videoId) {
            if (typeof YT !== 'undefined' && YT.Player) {
                initYouTube();
            } else {
                window.onYouTubeIframeAPIReady = initYouTube;
            }

        } else if (type === 'twitch' && videoId) {
            twitchPlayer = new Twitch.Player("player-container", {
                channel: videoId,
                width: "100%",
                height: "100%",
                autoplay: true,
                muted: true
            });

        } else if (type === 'kick' && videoId) {
            container.innerHTML = `<iframe src="https://player.kick.com/${videoId}?autoplay=true&muted=true" allow="autoplay; fullscreen"></iframe>`;

        } else if (type === 'direct' && videoId) {
            container.innerHTML = `<video id="direct-video" src="${decodeURIComponent(videoId)}" autoplay loop muted></video>`;
            directPlayer = document.getElementById('direct-video');
            directPlayer.currentTime = startTime;
        }
    </script>
</body>
</html>
