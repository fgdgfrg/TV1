<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #player-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
    <div id="player-container"></div>
    <script>
        const params    = new URLSearchParams(window.location.search);
        const type      = params.get('type');
        const videoId   = params.get('v');
        const startTime = parseInt(params.get('t')) || 0;
        const container = document.getElementById('player-container');

        // ══════════════════════════════════════════════
        // كل شيء MUTED دائماً بدون استثناء
        // الصوت يجي فقط عبر xSound من الكلايانت
        // ══════════════════════════════════════════════

        function forceMute(player) {
            try { player.mute(); } catch(e) {}
        }

        function initYouTube() {
            const ytPlayer = new YT.Player('player-container', {
                videoId: videoId,
                playerVars: {
                    autoplay:        1,
                    controls:        0,
                    mute:            1,
                    start:           startTime,
                    rel:             0,
                    modestbranding:  1,
                    iv_load_policy:  3,
                    disablekb:       1,
                    playsinline:     1,
                    origin:          window.location.origin
                },
                events: {
                    onReady(e) {
                        e.target.mute();
                        e.target.playVideo();
                    },
                    onStateChange(e) {
                        // نضمن mute في كل حالة — حتى لو YouTube شغّل إعلان
                        forceMute(e.target);

                        if (e.data === YT.PlayerState.ENDED) {
                            e.target.seekTo(0, true);
                            e.target.playVideo();
                        }
                    },
                    onError() {
                        // لو في خطأ نحاول نعيد التشغيل
                        setTimeout(() => {
                            try { ytPlayer.playVideo(); } catch(e) {}
                        }, 2000);
                    }
                }
            });
        }

        if (type === 'youtube' && videoId) {
            if (typeof YT !== 'undefined' && YT.Player) {
                initYouTube();
            } else {
                window.onYouTubeIframeAPIReady = initYouTube;
            }

        } else if (type === 'twitch' && videoId) {
            const twitchPlayer = new Twitch.Player("player-container", {
                channel:  videoId,
                width:    "100%",
                height:   "100%",
                autoplay: true,
                muted:    true   // مكتوم دائماً
            });
            // نتأكد من الكتم بعد التحميل
            twitchPlayer.addEventListener(Twitch.Player.READY, () => {
                twitchPlayer.setMuted(true);
            });
            twitchPlayer.addEventListener(Twitch.Player.PLAYING, () => {
                twitchPlayer.setMuted(true);
            });

        } else if (type === 'kick' && videoId) {
            container.innerHTML = `
                <iframe
                    src="https://player.kick.com/${videoId}?autoplay=true&muted=true"
                    allow="autoplay; fullscreen"
                    allowfullscreen>
                </iframe>`;

        } else if (type === 'direct' && videoId) {
            container.innerHTML = `
                <video
                    src="${decodeURIComponent(videoId)}"
                    autoplay
                    loop
                    muted
                    playsinline
                    style="width:100%;height:100%;object-fit:cover">
                </video>`;
            const vid = container.querySelector('video');
            vid.addEventListener('loadedmetadata', () => {
                if (vid.duration && startTime > 0) {
                    vid.currentTime = startTime % vid.duration;
                }
            });
        }
    </script>
</body>
</html>
